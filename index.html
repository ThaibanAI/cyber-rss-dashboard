<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber RSS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🛡️</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-shield-halved"></i>
          </div>
          <div class="logo-text">
            <h1>Cyber RSS</h1>
            <span class="logo-sub">Dashboard</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="refreshBtn" class="btn btn-icon" title="Refresh feeds">
            <i class="fas fa-rotate"></i>
          </button>
          <button id="themeToggle" class="btn btn-icon" title="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <section class="controls">
      <div class="controls-inner">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search articles by title, keyword, or source..." autocomplete="off">
          <button id="clearSearch" class="btn btn-icon search-clear" style="display:none;">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <div class="filter-row">
          <div class="category-filters" id="categoryFilters">
            <!-- filled by JS -->
          </div>
          <div class="source-select-wrapper">
            <select id="sourceSelect" class="source-select">
              <option value="all">All Sources</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- Stats bar -->
    <section class="stats-bar" id="statsBar">
      <span id="articleCount">0 articles</span>
      <span class="stat-sep">·</span>
      <span id="activeSources">0 sources</span>
      <span class="stat-sep">·</span>
      <span id="lastUpdated">Never</span>
    </section>

    <!-- Feed status alerts -->
    <section id="feedAlerts" class="feed-alerts"></section>

    <!-- News Grid -->
    <main class="news-grid" id="newsGrid">
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Loading cybersecurity feeds...</p>
      </div>
      <div class="error-state" id="errorState" style="display:none;">
        <i class="fas fa-triangle-exclamation"></i>
        <p>Failed to load feeds. Check your connection or try again.</p>
        <button class="btn btn-primary" onclick="loadFeeds()">Retry</button>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="fas fa-newspaper"></i>
        <p>No articles found matching your filters.</p>
      </div>
      <div id="articlesContainer" class="articles-container"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <p>Cyber RSS Dashboard · <span id="footerYear"></span></p>
        <p class="footer-meta">Data sourced from public RSS feeds · Built for cybersecurity awareness</p>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
